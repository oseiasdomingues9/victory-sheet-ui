name: Deploy Web Victory Sheet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build docker image
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ZITADEL_AUTHORITY: ${{ secrets.VITE_ZITADEL_AUTHORITY }}
          VITE_ZITADEL_CLIENT_ID: ${{ secrets.VITE_ZITADEL_CLIENT_ID }}
        run: >
          docker build
          --build-arg VITE_API_URL=$VITE_API_URL
          --build-arg VITE_ZITADEL_AUTHORITY=$VITE_ZITADEL_AUTHORITY
          --build-arg VITE_ZITADEL_CLIENT_ID=$VITE_ZITADEL_CLIENT_ID
          -t oseiasoliveira/victory-ui:${{ github.ref_name }}
          -t oseiasoliveira/victory-ui:latest
          .

      - name: Push docker image
        run: |
          docker push oseiasoliveira/victory-ui:${{ github.ref_name }}
          docker push oseiasoliveira/victory-ui:latest